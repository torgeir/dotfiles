# https://github.com/sxyazi/yazi/blob/main/yazi-config/preset/keymap-default.toml

[[mgr.prepend_keymap]]
on = "?"
run = "help"
desc = ""

[[mgr.prepend_keymap]]
on = "<A-Up>"
run = "cd .."
desc = ""

[[mgr.prepend_keymap]]
on = "<A-Down>"
run = "enter"
desc = ""

[[mgr.prepend_keymap]]
on = "<C-h>"
run = "hidden toggle"
desc = ""

[[mgr.prepend_keymap]]
on = "<C-Right>"
run = "tag_switch -1 --relative"
desc = ""

[[mgr.prepend_keymap]]
on = "<C-Left>"
run = "tag_switch 1 --relative"
desc = ""

[[mgr.prepend_keymap]]
on = "e"
run = 'shell -- emacsclient --socket-name $HOME/.emacs.d/server/server --no-wait "$@"'
desc = "open with emacs (ext)"

[[mgr.prepend_keymap]]
on = ["g", "e"]
run = 'shell --block -- emacsclient --socket-name $HOME/.emacs.d/server/server -t "$@"'
desc = "open with emacs"

[[mgr.prepend_keymap]]
on = ["g", "v"]
run = 'shell --block -- vim "$@"'
desc = "open with vim"

[[mgr.prepend_keymap]]
on = ["g", "o"]
run = 'shell -- thunar "$@"'
desc = "open with file mgr"

[[mgr.prepend_keymap]]
on = ["g", "t"]
run  = 'shell "$SHELL" --block'
desc = "spawn terminal"

[[mgr.prepend_keymap]]
on   = "!"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

[[mgr.prepend_keymap]]
on = ["g", "T"]
run = ['shell -- ghostty --working-directory="$@"']
desc = "spawn new terminal"
orphan = true

# Remap ; to blocking interactive shell (what : used to do)
[[mgr.prepend_keymap]]
on = [ ";" ]
run = "shell --interactive --block"
desc = "Shell (block)"

# quit to folder
[[mgr.prepend_keymap]]
on = [ ":", "q" ]
run = ['shell -- ya emit cd "$@"', "quit"]
desc = "quit to folder"

[[mgr.prepend_keymap]]
on = [ "g", "r" ]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
